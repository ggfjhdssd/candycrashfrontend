<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🍭 Candy Crush</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;}
body{
  font-family:'Nunito',sans-serif;
  background:#18002a url('assets/background.jpg') center/cover no-repeat;
  position:relative;user-select:none;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(155deg,rgba(175,0,115,.52)0%,rgba(65,0,95,.62)55%,rgba(15,0,55,.72)100%);
}

/* ── LOADER ── */
#ldr{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(135deg,#e91e8c,#7b1fa2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .4s;
}
.ldr-ic{font-size:3.5rem;animation:bounce .85s ease-in-out infinite alternate;}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.18)}}
.ldr-tx{font-size:1.75rem;font-weight:900;color:#fff;letter-spacing:-.02em;text-shadow:0 3px 10px rgba(0,0,0,.35);}
.spin{width:34px;height:34px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:rot .75s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── SCREENS ── */
.scr{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 9px 6px;
  opacity:0;pointer-events:none;
  transition:opacity .28s ease;
}
.scr.on{opacity:1;pointer-events:auto;}

/* ══ SEARCH SCREEN ══ */
#s-search{justify-content:center;gap:16px;}
.s-card{
  background:rgba(255,255,255,.14);backdrop-filter:blur(22px);
  border:2px solid rgba(255,255,255,.28);border-radius:24px;
  padding:28px 22px;text-align:center;width:100%;max-width:318px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
}
.sc-ic{font-size:3rem;animation:bounce 1s ease-in-out infinite alternate;}
.sc-ti{font-size:1.3rem;font-weight:900;color:#fff;margin:10px 0 5px;}
.sc-su{font-size:.83rem;color:rgba(255,255,255,.75);}
.dots{display:flex;gap:7px;justify-content:center;margin:14px 0;}
.dot{width:9px;height:9px;border-radius:50%;background:#fff;animation:dp 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{transform:scale(.6);opacity:.3}50%{transform:scale(1.15);opacity:1}}
.sc-inf{background:rgba(255,255,255,.1);border-radius:12px;padding:11px;
  font-size:.82rem;color:rgba(255,255,255,.88);line-height:1.95;}
.btn-cx{
  width:100%;max-width:318px;padding:13px;
  background:rgba(255,255,255,.17);border:2px solid rgba(255,255,255,.35);
  border-radius:14px;color:#fff;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all .18s;
}
.btn-cx:active{transform:scale(.96);}

/* ══ GAME SCREEN ══ */
#s-game{justify-content:flex-start;gap:0;}

/* Top bar */
.topbar{
  display:grid;grid-template-columns:1fr 66px 1fr;
  align-items:center;gap:5px;
  width:100%;max-width:420px;margin-bottom:5px;flex-shrink:0;
}
.sbox{
  background:rgba(255,255,255,.15);backdrop-filter:blur(16px);
  border:2px solid rgba(255,255,255,.28);border-radius:14px;
  padding:7px 8px;text-align:center;overflow:hidden;
}
.sbox.me {border-color:rgba(255,215,0,.65);background:rgba(255,215,0,.18);}
.sbox.opp{border-color:rgba(255,105,180,.65);background:rgba(255,105,180,.16);}
.sb-nm{font-size:9px;font-weight:700;color:rgba(255,255,255,.75);
  text-transform:uppercase;letter-spacing:.05em;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sb-sc{font-size:1.55rem;font-weight:900;line-height:1;
  color:#ffd700;text-shadow:0 2px 6px rgba(0,0,0,.4);}
.sbox.opp .sb-sc{color:#ff9de2;}
.sb-lb{font-size:7px;color:rgba(255,255,255,.45);margin-top:1px;}
.tbox{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,.14);backdrop-filter:blur(16px);
  border:2px solid rgba(255,255,255,.26);border-radius:13px;padding:5px 6px;
}
.t-num{font-size:1.22rem;font-weight:900;color:#fff;
  font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.t-num.hot{color:#ff6b6b;animation:hotpop .5s ease-in-out infinite alternate;}
@keyframes hotpop{from{transform:scale(1)}to{transform:scale(1.14)}}
.t-ic{font-size:8px;color:rgba(255,255,255,.5);}

/* Board area */
.bwrap{
  position:relative;width:100%;max-width:420px;
  flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
}
.bframe{
  position:absolute;inset:-5px;pointer-events:none;z-index:2;
  background:url('assets/bg1.png') center/100% 100% no-repeat;opacity:.5;
}

/* ── THE GRID ──
   Grid cells are created once in JS. We NEVER innerHTML="" the grid.
   Only img.src is updated for individual cells.                        */
#grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
  width:100%;
  aspect-ratio:1;
  max-height:calc(100vh - 158px);
  position:relative;z-index:3;
  will-change:transform;
}

/* ── CELL ── */
.cell{
  aspect-ratio:1;
  position:relative;
  border-radius:7px;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.12);
  overflow:hidden;
  cursor:pointer;
  /* GPU layer — smooth transforms */
  will-change:transform,opacity;
  transition:transform .1s ease, box-shadow .1s ease;
}

/* Selected highlight */
.cell.sel{
  background:rgba(255,215,0,.28);
  border-color:#ffd700;
  box-shadow:0 0 14px rgba(255,215,0,.7), inset 0 0 7px rgba(255,215,0,.25);
  transform:scale(1.07);
  z-index:5;
}

/* Candy image */
.cell img{
  position:absolute;
  inset:4%;width:92%;height:92%;
  object-fit:contain;
  display:block;
  pointer-events:none;
  will-change:transform,opacity;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.28));
}

/* EXPLODE: CSS keyframe — no JS re-render */
@keyframes kExplode{
  0%  {transform:scale(1);   opacity:1;}
  40% {transform:scale(1.5); opacity:.7;filter:brightness(2.2) drop-shadow(0 0 10px #fff);}
  100%{transform:scale(0);   opacity:0;}
}
.cell.exploding img{animation:kExplode .32s ease-out forwards;}

/* FALL-IN: new candies drop from top */
@keyframes kFall{
  from{transform:translateY(-115%) scale(.8);opacity:0;}
  to  {transform:translateY(0)       scale(1);opacity:1;}
}
.cell.fallin img{animation:kFall .34s cubic-bezier(.22,1.2,.36,1) both;}

/* SWAP BOUNCE (valid swap preview) */
@keyframes kSwap{0%{transform:scale(1)}45%{transform:scale(1.18)}100%{transform:scale(1)}}
.cell.swpd img{animation:kSwap .22s ease-out;}

/* SHAKE (invalid move) */
@keyframes kShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.cell.shake{animation:kShake .24s ease-in-out;}

/* Opponent status bar */
.oppbar{
  display:flex;align-items:center;gap:8px;
  width:100%;max-width:420px;flex-shrink:0;
  margin-top:4px;
  background:rgba(255,255,255,.11);backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,105,180,.3);border-radius:13px;
  padding:7px 12px;
}
.ob-lb{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);}
.ob-nm{font-size:12px;font-weight:800;color:#ff9de2;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ob-sc{font-size:1.1rem;font-weight:900;color:#ff9de2;}
.ob-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition:background .4s;}
.ob-dot.live{background:#00e676;}

/* ══ RESULT SCREEN ══ */
#s-result{justify-content:center;}
.rc{
  background:linear-gradient(135deg,rgba(28,0,52,.97),rgba(68,0,78,.97));
  border:2px solid rgba(255,255,255,.18);border-radius:26px;
  padding:30px 22px;text-align:center;width:100%;max-width:308px;
  box-shadow:0 24px 60px rgba(0,0,0,.55);
  animation:rIn .4s cubic-bezier(.16,1,.3,1);
}
@keyframes rIn{from{opacity:0;transform:scale(.85) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}
.r-ic{font-size:3.8rem;display:block;margin-bottom:8px;}
.r-ti{font-size:1.75rem;font-weight:900;color:#fff;margin-bottom:5px;}
.r-ti.win{background:linear-gradient(135deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.r-ti.lose{color:#ff9de2;}.r-ti.draw{color:#c4b5fd;}
.r-sc{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0;}
.rs-b{background:rgba(255,255,255,.09);border-radius:11px;padding:10px 6px;}
.rs-nm{font-size:9px;color:rgba(255,255,255,.5);margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.rs-v{font-size:1.55rem;font-weight:900;color:#fff;}
.rs-v.hl{color:#ffd700;text-shadow:0 0 18px rgba(255,215,0,.5);}
.r-prz{
  background:rgba(255,215,0,.14);border:1.5px solid rgba(255,215,0,.35);
  border-radius:11px;padding:10px;margin-bottom:14px;
  font-size:.88rem;font-weight:700;color:#ffd700;
}
.r-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.87rem;
  border:none;border-radius:12px;padding:12px 6px;cursor:pointer;color:#fff;transition:all .16s;}
.r-btn:active{transform:scale(.95);}
.rb-play{background:linear-gradient(135deg,#e91e8c,#7b1fa2);box-shadow:0 4px 16px rgba(233,30,140,.4);}
.rb-home{background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);}

/* ── OVERLAYS ── */
.sc-pop{
  position:fixed;pointer-events:none;z-index:600;
  font-size:1.1rem;font-weight:900;color:#ffd700;
  text-shadow:0 2px 8px rgba(0,0,0,.6);
  animation:scpop .9s ease-out forwards;
}
@keyframes scpop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-55px) scale(1.5)}}

#fkdc{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
}
#fkdc.on{display:flex;}
.fkdc-c{background:rgba(18,0,38,.97);border:2px solid rgba(233,30,140,.35);
  border-radius:20px;padding:28px 22px;text-align:center;max-width:268px;}
.fkdc-ic{font-size:2.5rem;margin-bottom:10px;}
.fkdc-tx{color:#fff;font-size:.95rem;font-weight:700;line-height:1.55;}

#toast{
  position:fixed;top:10px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  z-index:900;opacity:0;pointer-events:none;
  transition:all .34s cubic-bezier(.68,-.55,.265,1.55);
}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.ti{padding:9px 18px;border-radius:100px;font-size:12px;font-weight:700;
  backdrop-filter:blur(20px);white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px;}
.tok{background:rgba(0,200,83,.9);color:#fff;}
.terr{background:rgba(239,68,68,.9);color:#fff;}

#jerry{position:fixed;right:5px;bottom:52px;width:44px;z-index:4;
  pointer-events:none;filter:drop-shadow(0 3px 7px rgba(0,0,0,.45));
  animation:jw 2.5s ease-in-out infinite;}
@keyframes jw{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg) scale(1.07)}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="ldr">
  <div class="ldr-ic">🍭</div>
  <div class="ldr-tx">Candy Crush</div>
  <div class="spin"></div>
</div>

<!-- TOAST -->
<div id="toast"><div class="ti" id="ti"></div></div>

<!-- FAKE DISCONNECT -->
<div id="fkdc">
  <div class="fkdc-c">
    <div class="fkdc-ic">📡</div>
    <div class="fkdc-tx" id="fkdc-msg">ချိတ်ဆက်မှု ပြဿနာ...</div>
    <div class="spin" style="margin:12px auto 0;"></div>
  </div>
</div>

<!-- JERRY -->
<img id="jerry" src="assets/jerry.png" alt="" onerror="this.remove()">

<!-- ══ SEARCH SCREEN ══ -->
<div class="scr" id="s-search">
  <div class="s-card">
    <div class="sc-ic">🍭</div>
    <div class="sc-ti">ဆော့ဖော် ရှာနေသည်...</div>
    <div class="sc-su">Multiplayer Match ရှာနေပါသည်</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="sc-inf">
      💰 ဝင်ကြေး: <b>500 MMK</b><br>
      🏆 နိုင်ရင်: <b>800 MMK</b><br>
      ⏱ ကစားချိန်: <b>3 မိနစ်</b>
    </div>
  </div>
  <button class="btn-cx" onclick="cancelSearch()">❌ ဖျက်သိမ်းမည်</button>
</div>

<!-- ══ GAME SCREEN ══ -->
<div class="scr" id="s-game">
  <div class="topbar">
    <div class="sbox me">
      <div class="sb-nm" id="my-name">ကိုယ်</div>
      <div class="sb-sc" id="my-score">0</div>
      <div class="sb-lb">မှတ်</div>
    </div>
    <div class="tbox">
      <div class="t-num" id="timer">3:00</div>
      <div class="t-ic">⏱</div>
    </div>
    <div class="sbox opp">
      <div class="sb-nm" id="opp-nm-top">ဆော့ဖော်</div>
      <div class="sb-sc" id="opp-score">0</div>
      <div class="sb-lb">မှတ်</div>
    </div>
  </div>

  <div class="bwrap">
    <div class="bframe"></div>
    <div id="grid"></div>
  </div>

  <div class="oppbar">
    <div class="ob-lb">🍬</div>
    <div class="ob-nm" id="opp-nm-bar">ဆော့ဖော်</div>
    <div class="ob-sc" id="opp-sc-bar">0</div>
    <div class="ob-dot" id="opp-dot"></div>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div class="scr" id="s-result">
  <div class="rc">
    <span class="r-ic" id="r-ic">🏆</span>
    <div class="r-ti" id="r-ti">ပြီးပါပြီ</div>
    <div class="r-sc">
      <div class="rs-b"><div class="rs-nm" id="r-my-nm">ကိုယ်</div><div class="rs-v" id="r-my-sc">0</div></div>
      <div class="rs-b"><div class="rs-nm" id="r-op-nm">ဆော့ဖော်</div><div class="rs-v" id="r-op-sc">0</div></div>
    </div>
    <div class="r-prz" id="r-prz">—</div>
    <div class="r-btns">
      <button class="r-btn rb-play" onclick="replayGame()">🍭 ထပ်ကစား</button>
      <button class="r-btn rb-home" onclick="goHome()">🏠 ပင်မ</button>
    </div>
  </div>
</div>

<script>
/* ╔═══════════════════════════════════════════════════════════╗
   ║  CANDY CRUSH PLAY.HTML — v2 (Fixed)                      ║
   ║  • DOM cells built ONCE — no innerHTML wipe              ║
   ║  • isProcessing released in finally {} always            ║
   ║  • Only score sent via socket (no board data)            ║
   ╚═══════════════════════════════════════════════════════════╝ */

// ─── CONFIG ───────────────────────────────────────────────────
const BACKEND        = 'https://candycrashbackend.onrender.com';
const ROWS           = 8;
const COLS           = 8;
const N_CANDY        = 9;       // p1.png … p9.png
const GAME_SEC       = 180;
const ANIM_EXPLODE   = 330;     // ms  (must match CSS .32s)
const ANIM_FALL      = 360;     // ms  (must match CSS .34s)
const ANIM_SWAP      = 220;     // ms
const ANIM_SHAKE     = 260;     // ms
const PTS_PER_CANDY  = 10;

// ─── STATE ────────────────────────────────────────────────────
let socket, myId, myName = '', gameId, oppId, oppName = '';
let myScore = 0, oppScore = 0, timeLeft = GAME_SEC;
let timerInt = null, gameOn = false;
let board = [];        // [r][c] = 1-9
let cells = [];        // [r][c] = <div.cell>

// ══ THE CRITICAL LOCK ══
// Released in EVERY try's finally block — guarantees unlock even on error
let busy = false;
let sel  = null;       // {r,c} currently selected

const tg = window.Telegram?.WebApp;

// ─── BOOT ─────────────────────────────────────────────────────
addEventListener('DOMContentLoaded', async () => {
  tg?.expand();

  try {
    const r = await fetch(`${BACKEND}/api/auth`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: tg?.initData||'', telegramId: tg?.initDataUnsafe?.user?.id })
    });
    const d = await r.json();
    if (d.error) { toast(d.error,1); return; }
    myId   = d.telegramId;
    myName = d.firstName || d.username || `User${myId}`;
  } catch { toast('Server ချိတ်ဆက်မရပါ',1); return; }

  hideLdr();
  connectSocket();
  doSearch();
});

function hideLdr() {
  const l = document.getElementById('ldr');
  l.style.opacity = '0';
  setTimeout(() => l.remove(), 420);
}

// ─── SOCKET ───────────────────────────────────────────────────
function connectSocket() {
  const jp = new URLSearchParams(location.search).get('join') || '';
  socket = io(BACKEND, { transports:['websocket','polling'], query:{join:jp} });

  socket.on('waitingForPlayer', ({gameId:gid}) => { gameId=gid; show('s-search'); });

  socket.on('gameStarted', d => {
    gameId  = d.gameId;
    oppId   = d.opponentId;
    oppName = d.players?.[d.opponentId] || d.opponentName || 'ဆော့ဖော်';
    myName  = d.players?.[d.myId] || myName;
    timeLeft = d.duration || GAME_SEC;
    launchGame();
  });

  socket.on('gameResumed', d => {
    gameId   = d.gameId;
    oppId    = d.opponentId;
    oppName  = d.players?.[d.opponentId] || 'ဆော့ဖော်';
    timeLeft = Math.max(0, Math.round(((d.duration||GAME_SEC)*1000-(d.elapsedMs||0))/1000));
    myScore  = d.myScore||0;
    oppScore = d.opponentScore||0;
    launchGame();
  });

  // ← Opponent score arrives — update UI only
  socket.on('opponentScore', ({score}) => {
    oppScore = score;
    setOppUI(oppScore);
    document.getElementById('opp-dot').classList.add('live');
  });

  socket.on('gameOver', d => {
    gameOn = false; busy = false;          // safety unlock
    clearInterval(timerInt);
    showResult(d.winner, myScore, d.scores?.[oppId]??oppScore, d.reason);
  });

  socket.on('fakeDisconnect', ({message}) => {
    busy=true; gameOn=false; clearInterval(timerInt);
    document.getElementById('fkdc-msg').textContent = message;
    document.getElementById('fkdc').classList.add('on');
  });

  socket.on('insufficientBalance', ({balance,required}) => {
    toast(`ငွေမလုံပါ (${balance}/${required} MMK)`,1);
    setTimeout(goHome,1800);
  });

  socket.on('searchCancelled', goHome);
  socket.on('error', ({msg}) => toast(msg,1));
}

// ─── SEARCH ───────────────────────────────────────────────────
function doSearch() {
  show('s-search');
  socket?.emit('findGame',{userId:myId});
}
function cancelSearch() {
  socket?.emit('cancelSearch',{userId:myId});
  goHome();
}

// ═══════════════════════════════════════════════════════════════
//  LAUNCH GAME
// ═══════════════════════════════════════════════════════════════
function launchGame() {
  busy = false; sel = null; gameOn = true;

  // UI labels
  document.getElementById('my-name').textContent    = myName;
  document.getElementById('opp-nm-top').textContent = oppName;
  document.getElementById('opp-nm-bar').textContent = oppName;
  document.getElementById('my-score').textContent   = myScore;
  setOppUI(oppScore);

  buildGrid();              // create DOM once
  board = makeBoard();      // generate valid board
  pushToDOM();              // set all img.src
  startTimer();
  show('s-game');
}

// ═══════════════════════════════════════════════════════════════
//  BUILD GRID — cells created ONCE, events bound ONCE
// ═══════════════════════════════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  cells = [];

  for (let r = 0; r < ROWS; r++) {
    cells.push([]);
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.r = r;
      div.dataset.c = c;

      const img = document.createElement('img');
      img.draggable = false;
      div.appendChild(img);

      // ── Event binding (once per cell, never re-bound) ──
      // Touch: track start coords to distinguish tap vs scroll
      let tr = -1, tc = -1;
      div.addEventListener('touchstart', e => {
        tr = r; tc = c;
        e.preventDefault();
      }, {passive:false});
      div.addEventListener('touchend', e => {
        if (tr === r && tc === c) handleClick(r, c);
        e.preventDefault();
      }, {passive:false});
      div.addEventListener('click', () => handleClick(r, c));

      g.appendChild(div);
      cells[r].push(div);
    }
  }
}

// ─── BOARD GENERATION ─────────────────────────────────────────
function makeBoard() {
  const b = [];
  for (let r=0;r<ROWS;r++) {
    b.push([]);
    for (let c=0;c<COLS;c++) {
      let t, tries=0;
      do {
        t = rand();
        tries++;
      } while(tries<40 && (
        (c>=2 && b[r][c-1]===t && b[r][c-2]===t) ||
        (r>=2 && b[r-1][c]===t && b[r-2][c]===t)
      ));
      b[r].push(t);
    }
  }
  return b;
}
const rand = () => 1 + Math.floor(Math.random()*N_CANDY);

// ── Push all board values to DOM (startup only) ──
function pushToDOM() {
  for (let r=0;r<ROWS;r++)
    for (let c=0;c<COLS;c++)
      setImg(r, c, board[r][c]);
}

// ── Set a single cell's candy image (ONLY change for most updates) ──
function setImg(r, c, type) {
  const img = cells[r][c].querySelector('img');
  if (type>0) { img.src=`assets/p${type}.png`; img.style.opacity='1'; }
  else          { img.style.opacity='0'; }
}

// ═══════════════════════════════════════════════════════════════
//  CLICK HANDLER
// ═══════════════════════════════════════════════════════════════
function handleClick(r, c) {
  // Guard: don't allow new clicks while animation chain is running
  if (!gameOn || busy) return;
  if (board[r][c]===0) return;

  if (!sel) {
    sel = {r,c};
    cells[r][c].classList.add('sel');
    return;
  }

  if (sel.r===r && sel.c===c) {
    // Tap same cell → deselect
    cells[r][c].classList.remove('sel');
    sel = null;
    return;
  }

  const dr = Math.abs(sel.r-r);
  const dc = Math.abs(sel.c-c);

  if (dr+dc===1) {
    // Adjacent — try swap
    const f = sel; sel = null;
    cells[f.r][f.c].classList.remove('sel');
    doSwap(f.r, f.c, r, c);    // async cascade, no await needed here
  } else {
    // Re-select
    cells[sel.r][sel.c].classList.remove('sel');
    sel = {r,c};
    cells[r][c].classList.add('sel');
  }
}

// ═══════════════════════════════════════════════════════════════
//  SWAP + CASCADE
// ═══════════════════════════════════════════════════════════════
async function doSwap(r1,c1,r2,c2) {
  // ══ LOCK — released in finally ALWAYS ══
  busy = true;

  try {
    // 1. Swap data
    swap(r1,c1,r2,c2);

    // 2. Update the 2 affected cells in DOM only
    setImg(r1,c1,board[r1][c1]);
    setImg(r2,c2,board[r2][c2]);
    addTmp(cells[r1][c1],'swpd',ANIM_SWAP);
    addTmp(cells[r2][c2],'swpd',ANIM_SWAP);
    await ms(ANIM_SWAP);

    // 3. Check matches
    const m = findMatches();

    if (!m.length) {
      // Invalid — swap back
      swap(r1,c1,r2,c2);
      setImg(r1,c1,board[r1][c1]);
      setImg(r2,c2,board[r2][c2]);
      addTmp(cells[r1][c1],'shake',ANIM_SHAKE);
      addTmp(cells[r2][c2],'shake',ANIM_SHAKE);
      await ms(ANIM_SHAKE);
      return;               // finally → busy=false
    }

    // 4. Valid → cascade
    await cascade();

  } finally {
    // ══ ALWAYS UNLOCK regardless of path above ══
    busy = false;
  }
}

// ─── DATA SWAP ────────────────────────────────────────────────
function swap(r1,c1,r2,c2) {
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
}

// ═══════════════════════════════════════════════════════════════
//  CASCADE LOOP
// ═══════════════════════════════════════════════════════════════
async function cascade() {
  let combo=0, earned=0;

  while(true) {
    const m = findMatches();
    if (!m.length) break;

    combo++;
    const mult = combo>1?combo:1;
    earned += m.length * PTS_PER_CANDY * mult;

    // A. Add exploding class (CSS handles animation — no re-render)
    m.forEach(({r,c}) => cells[r][c].classList.add('exploding'));
    await ms(ANIM_EXPLODE);

    // B. Remove from board + hide images (only matched cells)
    m.forEach(({r,c}) => {
      cells[r][c].classList.remove('exploding');
      board[r][c] = 0;
      setImg(r,c,0);
    });

    // C. Gravity — shift board data, get list of changed cells
    const fell = gravity();

    // D. Update changed cells + play fall animation
    fell.forEach(({r,c}) => {
      setImg(r,c,board[r][c]);
      addTmp(cells[r][c],'fallin',ANIM_FALL);
    });
    await ms(ANIM_FALL);
  }

  if (earned>0) {
    myScore += earned;
    document.getElementById('my-score').textContent = myScore;
    popScore(earned);
    // ← Send ONLY the score to backend (no board array)
    socket?.emit('scoreUpdate', { gameId, score: myScore });
  }
}

// ═══════════════════════════════════════════════════════════════
//  MATCH DETECTION  (returns [{r,c}])
// ═══════════════════════════════════════════════════════════════
function findMatches() {
  const set = new Set();

  // Horizontal
  for (let r=0;r<ROWS;r++) {
    let c=0;
    while(c<COLS) {
      const t=board[r][c];
      if (!t){c++;continue;}
      let n=1;
      while(c+n<COLS && board[r][c+n]===t) n++;
      if(n>=3) for(let i=0;i<n;i++) set.add(`${r},${c+i}`);
      c+=n;
    }
  }

  // Vertical
  for (let c=0;c<COLS;c++) {
    let r=0;
    while(r<ROWS) {
      const t=board[r][c];
      if(!t){r++;continue;}
      let n=1;
      while(r+n<ROWS && board[r+n][c]===t) n++;
      if(n>=3) for(let i=0;i<n;i++) set.add(`${r+i},${c}`);
      r+=n;
    }
  }

  return [...set].map(s=>{ const[r,c]=s.split(',').map(Number); return{r,c}; });
}

// ═══════════════════════════════════════════════════════════════
//  GRAVITY  — candies fall down, new ones fill from top
//  Returns list of {r,c} that changed (to animate only those)
// ═══════════════════════════════════════════════════════════════
function gravity() {
  const changed=[];
  for(let c=0;c<COLS;c++) {
    // Collect non-zero from bottom→top
    const kept=[];
    for(let r=ROWS-1;r>=0;r--) if(board[r][c]) kept.push(board[r][c]);
    const newOnes=ROWS-kept.length;
    const col=[];
    for(let i=0;i<newOnes;i++) col.push(rand());   // new candies (top)
    kept.reverse().forEach(t=>col.push(t));         // existing (bottom)
    // Write back, record changes
    for(let r=0;r<ROWS;r++) {
      if(board[r][c]!==col[r]) {
        board[r][c]=col[r];
        changed.push({r,c});
      }
    }
  }
  return changed;
}

// ═══════════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════════
function startTimer() {
  clearInterval(timerInt);
  renderTimer();
  timerInt = setInterval(()=>{
    timeLeft = Math.max(0,timeLeft-1);
    renderTimer();
    if(timeLeft===0){ clearInterval(timerInt); gameOn=false; }
  },1000);
}
function renderTimer() {
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  const el=document.getElementById('timer');
  el.textContent=`${m}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('hot',timeLeft<=30);
}

// ─── OPP SCORE UI ─────────────────────────────────────────────
function setOppUI(v) {
  document.getElementById('opp-score').textContent  = v;
  document.getElementById('opp-sc-bar').textContent = v;
}

// ─── SCORE POP ────────────────────────────────────────────────
function popScore(pts) {
  const el=document.createElement('div');
  el.className='sc-pop';
  el.textContent=`+${pts}`;
  el.style.left=(18+Math.random()*58)+'%';
  el.style.top =(22+Math.random()*38)+'%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

// ═══════════════════════════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════════════════════════
function showResult(winner,myFin,oppFin,reason) {
  const win  = String(winner)===String(myId);
  const draw = winner===-1||winner==null;
  document.getElementById('r-ic').textContent = win?'🏆':draw?'🤝':'😢';
  const t=document.getElementById('r-ti');
  t.textContent = win?'အနိုင်ရသည်! 🎉':draw?'သရေကျသည်':'ရှုံးသွားသည်';
  t.className='r-ti '+(win?'win':draw?'draw':'lose');
  document.getElementById('r-my-nm').textContent = myName;
  document.getElementById('r-op-nm').textContent = oppName;
  const ms=document.getElementById('r-my-sc');
  const os=document.getElementById('r-op-sc');
  ms.textContent=myFin; os.textContent=oppFin;
  ms.className='rs-v'+(win?' hl':'');
  os.className='rs-v'+(!win&&!draw?' hl':'');
  const p=document.getElementById('r-prz');
  if(win)  p.textContent='🏆 +800 MMK လောင်းကြေး ရပြီ!';
  else if(draw) p.textContent='🤝 250 MMK ပြန်ရမည်';
  else if(reason==='disconnect') p.textContent='📡 ဆော့ဖော် ချိတ်ဆက်မှု ပြတ်တောက်';
  else p.textContent='😢 နောက်တစ်ကြိမ် ကြိုးစားပါ!';
  show('s-result');
}

// ─── NAVIGATION ───────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
}
function replayGame() {
  myScore=0;oppScore=0;gameId=null;sel=null;busy=false;
  clearInterval(timerInt);
  doSearch();
}
function goHome() {
  tg ? tg.close() : (location.href='/');
}

// ─── UTILS ────────────────────────────────────────────────────
const ms = t => new Promise(r=>setTimeout(r,t));

function addTmp(el,cls,dur) {
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls), dur);
}

let _tt=null;
function toast(msg,err=0) {
  const el=document.getElementById('toast'),ti=document.getElementById('ti');
  ti.textContent=(err?'⚠️ ':'✅ ')+msg;
  ti.className='ti '+(err?'terr':'tok');
  el.classList.add('on');
  clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('on'),2700);
}
